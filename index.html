    <script>
        (function() {
            function aplicarFaviconSemDistorcao(src) {
                var img = new Image();
                img.onload = function() {
                    var size = 64;
                    var canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    var ctx = canvas.getContext('2d');
                    if (!ctx) return;

                    var escala = Math.min(size / img.width, size / img.height);
                    var w = img.width * escala;
                    var h = img.height * escala;
                    var x = (size - w) / 2;
                    var y = (size - h) / 2;

                    ctx.clearRect(0, 0, size, size);
                    ctx.drawImage(img, x, y, w, h);

                    var dataUrl = canvas.toDataURL('image/png');
                    var link = document.querySelector('link[rel="icon"]') || document.createElement('link');
                    link.rel = 'icon';
                    link.type = 'image/png';
                    link.href = dataUrl;
                    if (!link.parentNode) {
                        document.head.appendChild(link);
                    }
                };
                img.src = src;
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    aplicarFaviconSemDistorcao('Logo.png');
                });
            } else {
                aplicarFaviconSemDistorcao('Logo.png');
            }
        })();
    </script>

<script>

function valorCampo(props, candidatos, fallback) {

function limparTextoRelatorio(texto) {

function normalizarChaveGenerica(chave) {

function valorCampoNormalizado(props, candidatos, fallback) {
    if (!props || typeof props !== 'object') return fallback;

    for (var i = 0; i < candidatos.length; i++) {
        var chaveDireta = candidatos[i];
        if (props[chaveDireta] !== undefined && props[chaveDireta] !== null && props[chaveDireta] !== '') {
            return props[chaveDireta];

    }

    var mapa = {};
    Object.keys(props).forEach(function(k) {
        mapa[normalizarChaveGenerica(k)] = props[k];
    });

    for (var j = 0; j < candidatos.length; j++) {
        var chaveNorm = normalizarChaveGenerica(candidatos[j]);
        if (mapa[chaveNorm] !== undefined && mapa[chaveNorm] !== null && mapa[chaveNorm] !== '') {

}

function normalizarComparacao(valor) {

function obterNomeAreaConformidade(props, fallback) {

function saoFeicoesContinuas(turfRef, featureA, featureB) {
    if (!turfRef || !featureA || !featureB) return false;

    var testes = [
        'booleanIntersects',
        'booleanTouches',
        'booleanOverlap',
        'booleanContains',
        'booleanWithin'
    ];

    for (var i = 0; i < testes.length; i++) {
        var nomeTeste = testes[i];
        if (typeof turfRef[nomeTeste] !== 'function') continue;

        try {
            if (turfRef[nomeTeste](featureA, featureB) || turfRef[nomeTeste](featureB, featureA)) {
                return true;
            }
        } catch (error) {
            // tenta o próximo predicado geométrico
        }
    }

    try {
        var bboxA = turfRef.bbox(featureA);
        var bboxB = turfRef.bbox(featureB);
        var separados = bboxA[2] < bboxB[0] || bboxB[2] < bboxA[0] || bboxA[3] < bboxB[1] || bboxB[3] < bboxA[1];
        return !separados;
    } catch (error) {
        return false;
    }
}

function montarAvisoConformidadeLocal(caso) {

    var declA = caso.declaranteA || 'declarante não informado';

    if (caso.tipo === 'mesmo_declarante_codigos_divergentes') {

    }

    return 'Foi identificada possível continuidade territorial entre os registros vinculados aos CCIRs ' + ccirA + ' e ' + ccirB + ', com declarantes distintos (' + declA + ' e ' + declB + ') para registros cadastrais coincidentes. Esse cenário sugere necessidade de reestruturação das declarações, pois o mesmo imóvel rural não deve permanecer associado a múltiplos declarantes quando houver correspondência cadastral entre as áreas.';
}

async function gerarAvisoConformidadeIA(caso) {
    var apiKey = (window.GEMINI_API_KEY || '').trim();

    if (!apiKey) {
        return montarAvisoConformidadeLocal(caso);
    }

    var prompt = 'Você é analista fundiário no Brasil. Gere 1 parágrafo técnico, objetivo e humanizado, em português do Brasil, sem tópicos, sem marcadores e sem quebra de linha. O texto deve indicar possível continuidade territorial entre áreas e recomendar necessidade de reestruturação das declarações. Não exponha dados de forma bruta (evite formato de lista de códigos e evite padrão campo: valor). Explique a inconsistência com base no conceito de imóvel rural de forma clara e concisa, usando apenas os dados fornecidos: ' + JSON.stringify(caso);

    try {
        var response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=' + apiKey, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 220, temperature: 0.2 }
            })
        });

        if (!response.ok) {
            throw new Error('Falha na API Gemini: ' + response.status);
        }

        var payload = await response.json();
        var texto = extrairTextoRespostaGemini(payload);
        var textoFinal = texto || montarAvisoConformidadeLocal(caso);
        return String(textoFinal).replace(/\s*\n+\s*/g, ' ').trim();
    } catch (error) {
        console.warn('Falha ao gerar aviso de conformidade com IA, usando fallback local.', error);
        return montarAvisoConformidadeLocal(caso);
    }
}

async function gerarAvisosConformidadeIA(inconsistencias) {
    var avisos = [];
    for (var i = 0; i < inconsistencias.length; i++) {
        var inconsistencia = inconsistencias[i];
        var texto = await gerarAvisoConformidadeIA(inconsistencia);
        avisos.push(String(texto || '').trim());

}

function detectarRelacionamentosConformidade(featureSelecionada, featuresColecao) {
    var turfRef = window.turf;
    if (!turfRef || !featureSelecionada || !featureSelecionada.geometry || !Array.isArray(featuresColecao)) {
        return { continuidades: [], inconsistencias: [] };
    }

    var selecionadaProps = featureSelecionada.properties || {};
    var selecionadaId = valorCampoNormalizado(selecionadaProps, ['id'], '');
    var selecionadaDeclarante = valorCampoNormalizado(selecionadaProps, ['Declarante', 'declarante'], 'Não informado');
    var selecionadaCCIR = valorCampoNormalizado(selecionadaProps, ['CCIR', 'ccir'], 'Não informado');
    var selecionadaCIB = valorCampoNormalizado(selecionadaProps, ['CIB', 'cib'], 'Não informado');

    var continuidades = [];
    var inconsistencias = [];

    featuresColecao.forEach(function(feature) {
        if (!feature || !feature.geometry || !feature.properties) return;

        var props = feature.properties;
        var idAtual = valorCampoNormalizado(props, ['id'], '');
        if (selecionadaId !== '' && idAtual !== '' && String(selecionadaId) === String(idAtual)) {
            return;
        }

        var mesmaGeometria = false;
        try {
            mesmaGeometria = turfRef.booleanEqual(featureSelecionada.geometry, feature.geometry);
        } catch (error) {
            mesmaGeometria = false;
        }
        if (mesmaGeometria) return;

        var emContinuidade = saoFeicoesContinuas(turfRef, featureSelecionada, feature);
        if (!emContinuidade) return;

        var declaranteAtual = valorCampoNormalizado(props, ['Declarante', 'declarante'], 'Não informado');
        var ccirAtual = valorCampoNormalizado(props, ['CCIR', 'ccir'], 'Não informado');
        var cibAtual = valorCampoNormalizado(props, ['CIB', 'cib'], 'Não informado');

        continuidades.push({
            ccir: ccirAtual,
            declarante: declaranteAtual,
            cib: cibAtual
        });

        var mesmoDeclarante = normalizarComparacao(selecionadaDeclarante) !== ''
            && normalizarComparacao(declaranteAtual) !== ''
            && normalizarComparacao(selecionadaDeclarante) === normalizarComparacao(declaranteAtual);
        var declarantesDiferentes = normalizarComparacao(selecionadaDeclarante) !== ''
            && normalizarComparacao(declaranteAtual) !== ''
            && normalizarComparacao(selecionadaDeclarante) !== normalizarComparacao(declaranteAtual);

        var ccirIguais = normalizarComparacao(selecionadaCCIR) !== ''
            && normalizarComparacao(ccirAtual) !== ''
            && normalizarComparacao(selecionadaCCIR) === normalizarComparacao(ccirAtual);
        var cibIguais = normalizarComparacao(selecionadaCIB) !== ''
            && normalizarComparacao(cibAtual) !== ''
            && normalizarComparacao(selecionadaCIB) === normalizarComparacao(cibAtual);

        var ccirDiferentes = normalizarComparacao(selecionadaCCIR) !== normalizarComparacao(ccirAtual);
        var cibDiferentes = normalizarComparacao(selecionadaCIB) !== normalizarComparacao(cibAtual);

        if (mesmoDeclarante && (ccirDiferentes || cibDiferentes)) {
            inconsistencias.push({
                tipo: 'mesmo_declarante_codigos_divergentes',
                declaranteA: selecionadaDeclarante,
                declaranteB: declaranteAtual,
                ccirA: selecionadaCCIR,
                ccirB: ccirAtual,
                cibA: selecionadaCIB,
                cibB: cibAtual
            });
            return;
        }

        if (declarantesDiferentes && ccirIguais && cibIguais) {
            inconsistencias.push({
                tipo: 'declarantes_diferentes_codigos_iguais',
                declaranteA: selecionadaDeclarante,
                declaranteB: declaranteAtual,
                ccirA: selecionadaCCIR,
                ccirB: ccirAtual,
                cibA: selecionadaCIB,
                cibB: cibAtual
            });
        }
    });

    return {
        continuidades: continuidades,
        inconsistencias: inconsistencias
    };
}

function montarAnaliseConformidadeLocal(resumo) {

    var ccirImovel = resumo && resumo.ccirImovelSelecionado ? resumo.ccirImovelSelecionado : 'CCIR do imóvel selecionado';

    function formatarListaComE(lista) {
        if (!lista || !lista.length) return '';
        if (lista.length === 1) return lista[0];
        if (lista.length === 2) return lista[0] + ' e ' + lista[1];
        return lista.slice(0, -1).join(', ') + ' e ' + lista[lista.length - 1];

    var ccirsDivergentesMap = {};

        }
        if (item.ccirB && String(item.ccirB) !== String(ccirImovel)) {
            ccirsDivergentesMap[item.ccirB] = true;
        }
    });
    var ccirsDivergentes = Object.keys(ccirsDivergentesMap);
    var textoCcirsDivergentes = ccirsDivergentes.length
        ? formatarListaComE(ccirsDivergentes)
        : 'sem registros divergentes adicionais';
    var termoImovel = ccirsDivergentes.length > 1 ? 'os imóveis' : 'o imóvel';
    var termoCCIR = ccirsDivergentes.length > 1 ? 'CCIRs' : 'CCIR';

    var primeiroParagrafo = 'Foi identificada possível continuidade de área de mesmos proprietários no imóvel em questão. Essa ocorrência de inconsistência envolve ' + termoImovel + ' de ' + termoCCIR + ' ' + textoCcirsDivergentes + '.';

    return [primeiroParagrafo, segundoParagrafoFixo, terceiroParagrafoFixo].join('\n\n');
}

function unificarTextoAnaliseConformidade(partes) {

        .join(' ')
        .replace(/\s{2,}/g, ' ')
        .trim();
}

async function gerarAnaliseConformidadeIA(resumo) {

async function consultarDesmatamentoProdesNoImovel(geometry) {
    var turfRef = window.turf;
    if (!turfRef) {
        return {
            disponivel: false,
            temDesmatamento: false,
            erro: 'Biblioteca Turf.js indisponível para análise PRODES.'
        };
    }

    if (!geometry || !geometry.type || !geometry.coordinates) {
        return {
            disponivel: false,
            temDesmatamento: false,
            erro: 'Geometria do imóvel inválida para consulta PRODES.'
        };
    }

    var wkt = geometriaGeoJsonParaWkt(geometry);
    if (!wkt) {
        return {
            disponivel: false,
            temDesmatamento: false,
            erro: 'Não foi possível converter a geometria do imóvel para consulta PRODES.'
        };
    }

    var featureImovel = turfRef.feature(geometry);
    var areaImovelHa = turfRef.area(featureImovel) / 10000;
    var endpoint = 'https://terrabrasilis.dpi.inpe.br/geoserver/wfs';
    var camadasProdes = [
        'prodes-amazon-nb:yearly_deforestation_biome',
        'prodes-legal-amz:yearly_deforestation',
        'prodes-cerrado-nb:yearly_deforestation',
        'prodes-caatinga-nb:yearly_deforestation',
        'prodes-mata-atlantica-nb:yearly_deforestation',
        'prodes-pampa-nb:yearly_deforestation',
        'prodes-pantanal-nb:yearly_deforestation'
    ];

    var areaSobrepostaHa = 0;
    var anosDetectados = {};
    var totalPoligonosIntersectantes = 0;
    var geometriasSobrepostas = [];
    var erros = [];

    for (var i = 0; i < camadasProdes.length; i++) {
        var camada = camadasProdes[i];
        var params = new URLSearchParams({
            service: 'WFS',
            version: '1.0.0',
            request: 'GetFeature',
            typeName: camada,
            outputFormat: 'application/json',
            srsName: 'EPSG:4674',
            maxFeatures: '5000',
            propertyName: 'geom,year',
            cql_filter: 'year>=' + prodesAnoInicial + ' AND INTERSECTS(geom,SRID=4674;' + wkt + ')'
        });

        try {
            var response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body: params.toString()
            });

            if (!response.ok) {
                throw new Error('Falha na camada ' + camada + ': HTTP ' + response.status);
            }

            var payload = await response.json();
            var features = payload && Array.isArray(payload.features) ? payload.features : [];

            features.forEach(function(feature) {
                if (!feature || !feature.geometry) return;

                var ano = Number(feature.properties && feature.properties.year);
                if (!isFinite(ano) || ano < prodesAnoInicial) {
                    return;
                }

                try {
                    var intersecao = turfRef.intersect(featureImovel, feature);
                    if (!intersecao || !intersecao.geometry) return;

                    var areaIntersecaoHa = turfRef.area(intersecao) / 10000;
                    if (!isFinite(areaIntersecaoHa) || areaIntersecaoHa <= 0) return;

                    areaSobrepostaHa += areaIntersecaoHa;
                    totalPoligonosIntersectantes += 1;
                    anosDetectados['d' + String(ano)] = true;
                    if (intersecao.geometry && (intersecao.geometry.type === 'Polygon' || intersecao.geometry.type === 'MultiPolygon')) {
                        geometriasSobrepostas.push({
                            ano: ano,
                            geometry: intersecao.geometry
                        });
                    }
                } catch (error) {
                    // ignora feição inválida pontual
                }
            });
        } catch (error) {
            erros.push((error && error.message) ? error.message : String(error));
        }
    }

    var codigos = Object.keys(anosDetectados).sort();
    var anoMaisRecente = null;
    codigos.forEach(function(codigo) {
        var anoNum = Number(String(codigo).replace(/^d/i, ''));
        if (isFinite(anoNum)) {
            anoMaisRecente = anoMaisRecente === null ? anoNum : Math.max(anoMaisRecente, anoNum);
        }
    });

    var percentualImovel = areaImovelHa > 0 ? (areaSobrepostaHa / areaImovelHa) * 100 : 0;

    return {
        disponivel: erros.length < camadasProdes.length,
        temDesmatamento: areaSobrepostaHa > 0,
        areaSobrepostaEstimHa: areaSobrepostaHa,
        areaSobrepostaEstimKm2: areaSobrepostaHa / 100,
        percentualImovel: percentualImovel,
        anoMaisRecente: anoMaisRecente,
        codigosDetectados: codigos,
        totalPoligonosIntersectantes: totalPoligonosIntersectantes,
        geometriasSobrepostas: geometriasSobrepostas,
        periodoInicial: prodesAnoInicial,
        erro: erros.length ? erros.join(' | ') : null
    };
}

function converterArrayBufferParaBase64(buffer) {
    var bytes = new Uint8Array(buffer || new ArrayBuffer(0));
    var chunkSize = 0x8000;
    var partes = [];

    for (var i = 0; i < bytes.length; i += chunkSize) {
        partes.push(String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize)));
    }

    return btoa(partes.join(''));
}

        .trim()

}

function achatarCoordenadas(geometry, coordenadas) {
    if (!geometry || !geometry.type || !geometry.coordinates) return;

    if (geometry.type === 'Polygon') {
        geometry.coordinates.forEach(function(ring) {
            ring.forEach(function(coord) {
                if (Array.isArray(coord) && coord.length >= 2) {
                    coordenadas.push([Number(coord[0]), Number(coord[1])]);
                }
            });
        });
        return;
    }

    if (geometry.type === 'MultiPolygon') {
        geometry.coordinates.forEach(function(poly) {
            poly.forEach(function(ring) {
                ring.forEach(function(coord) {
                    if (Array.isArray(coord) && coord.length >= 2) {
                        coordenadas.push([Number(coord[0]), Number(coord[1])]);
                    }
                });
            });
        });
    }
}

function desenharGeometria(ctx, geometry, projetar) {
    if (!geometry || !geometry.type || !geometry.coordinates) return;

    function desenharAnel(ring) {
        if (!ring || !ring.length) return;
        ring.forEach(function(coord, index) {
            var ponto = projetar(coord);
            if (index === 0) {
                ctx.moveTo(ponto.x, ponto.y);
            } else {
                ctx.lineTo(ponto.x, ponto.y);
            }
        });
        ctx.closePath();
    }

    if (geometry.type === 'Polygon') {
        geometry.coordinates.forEach(desenharAnel);
        return;
    }

    if (geometry.type === 'MultiPolygon') {
        geometry.coordinates.forEach(function(poly) {
            poly.forEach(desenharAnel);
        });
    }
}

function fecharAnelWkt(ring) {
    if (!Array.isArray(ring) || !ring.length) return [];

    var pontos = ring
        .filter(function(coord) {
            return Array.isArray(coord) && coord.length >= 2 && isFinite(Number(coord[0])) && isFinite(Number(coord[1]));
        })
        .map(function(coord) {
            return [Number(coord[0]), Number(coord[1])];
        });

    if (pontos.length < 3) return [];

    var primeiro = pontos[0];
    var ultimo = pontos[pontos.length - 1];
    if (primeiro[0] !== ultimo[0] || primeiro[1] !== ultimo[1]) {
        pontos.push([primeiro[0], primeiro[1]]);
    }

    return pontos;
}

function anelParaWkt(ring) {
    var fechado = fecharAnelWkt(ring);
    if (!fechado.length) return null;
    return '(' + fechado.map(function(pt) { return pt[0] + ' ' + pt[1]; }).join(', ') + ')';
}

function geometriaGeoJsonParaWkt(geometry) {
    if (!geometry || !geometry.type || !geometry.coordinates) return null;

    if (geometry.type === 'Polygon') {
        var aneis = geometry.coordinates
            .map(anelParaWkt)
            .filter(Boolean);

        if (!aneis.length) return null;
        return 'POLYGON(' + aneis.join(', ') + ')';
    }

    if (geometry.type === 'MultiPolygon') {
        var polys = geometry.coordinates
            .map(function(poly) {
                var aneis = (poly || []).map(anelParaWkt).filter(Boolean);
                if (!aneis.length) return null;
                return '(' + aneis.join(', ') + ')';
            })
            .filter(Boolean);

        if (!polys.length) return null;
        return 'MULTIPOLYGON(' + polys.join(', ') + ')';
    }

    return null;
}

function formatarNumeroPtBr(valor, casasDecimais) {
    var numero = Number(valor);
    if (!isFinite(numero)) return '0';
    return numero.toLocaleString('pt-BR', {
        minimumFractionDigits: casasDecimais,
        maximumFractionDigits: casasDecimais
    });
}

function carregarImagemComCORS(url) {
    return new Promise(function(resolve, reject) {
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
            resolve(img);
        };
        img.onerror = function() {

        };
        img.src = url;
    });
}

function limitarLatitudeMercator(lat) {
    return Math.max(-85.05112878, Math.min(85.05112878, Number(lat)));
}

function lonParaPixelMercator(lon, zoom) {
    var escala = 256 * Math.pow(2, zoom);
    return ((Number(lon) + 180) / 360) * escala;
}

function latParaPixelMercator(lat, zoom) {
    var escala = 256 * Math.pow(2, zoom);
    var latClamped = limitarLatitudeMercator(lat);
    var latRad = latClamped * Math.PI / 180;
    return (0.5 - (Math.log((1 + Math.sin(latRad)) / (1 - Math.sin(latRad))) / (4 * Math.PI))) * escala;
}

function calcularMelhorZoomBboxMercator(bbox, larguraUtil, alturaUtil) {
    for (var z = 18; z >= 3; z--) {
        var minPxX = lonParaPixelMercator(bbox.minLon, z);
        var maxPxX = lonParaPixelMercator(bbox.maxLon, z);
        var minPxY = latParaPixelMercator(bbox.maxLat, z);
        var maxPxY = latParaPixelMercator(bbox.minLat, z);

        var spanX = Math.max(1, maxPxX - minPxX);
        var spanY = Math.max(1, maxPxY - minPxY);

        if (spanX <= larguraUtil && spanY <= alturaUtil) {
            return z;
        }
    }

    return 3;
}

function construirBboxPadronizado(minX, maxX, minY, maxY, larguraUtil, alturaUtil) {
    var centroLon = (Number(minX) + Number(maxX)) / 2;
    var centroLat = (Number(minY) + Number(maxY)) / 2;

    var spanLon = Math.max(0.0002, Number(maxX) - Number(minX));
    var minLatBase = limitarLatitudeMercator(Number(minY));
    var maxLatBase = limitarLatitudeMercator(Number(maxY));
    var centroLatPxBase = latParaPixelMercator(centroLat, 10);
    var spanLatPxBase = Math.max(1, Math.abs(latParaPixelMercator(minLatBase, 10) - latParaPixelMercator(maxLatBase, 10)));

    // Relative margin around the property before fitting the map viewport aspect ratio.
    var margemRelativa = 0.18;
    spanLon = spanLon * (1 + (margemRelativa * 2));
    spanLatPxBase = spanLatPxBase * (1 + (margemRelativa * 2));

    var proporcaoAlvo = Math.max(0.1, Number(larguraUtil) / Math.max(1, Number(alturaUtil)));
    var spanLonPxBase = Math.max(1, lonParaPixelMercator(centroLon + (spanLon / 2), 10) - lonParaPixelMercator(centroLon - (spanLon / 2), 10));
    var proporcaoAtual = spanLonPxBase / spanLatPxBase;

    if (proporcaoAtual > proporcaoAlvo) {
        spanLatPxBase = spanLonPxBase / proporcaoAlvo;
    } else {
        spanLonPxBase = spanLatPxBase * proporcaoAlvo;
        var grausPorPixelLon = 360 / (256 * Math.pow(2, 10));
        spanLon = spanLonPxBase * grausPorPixelLon;
    }

    var minLon = centroLon - (spanLon / 2);
    var maxLon = centroLon + (spanLon / 2);
    var minLatPxFinal = centroLatPxBase + (spanLatPxBase / 2);
    var maxLatPxFinal = centroLatPxBase - (spanLatPxBase / 2);
    var escalaLat = 256 * Math.pow(2, 10);

    function pixelParaLatitudeMercator(pixelY, escala) {
        var n = Math.PI - ((2 * Math.PI * pixelY) / escala);
        return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
    }

    var minLat = limitarLatitudeMercator(pixelParaLatitudeMercator(minLatPxFinal, escalaLat));
    var maxLat = limitarLatitudeMercator(pixelParaLatitudeMercator(maxLatPxFinal, escalaLat));

    return {
        minLon: minLon,
        maxLon: maxLon,
        minLat: minLat,
        maxLat: maxLat
    };
}

async function carregarTileSatelite(tileX, tileY, zoom) {
    var totalTiles = Math.pow(2, zoom);
    var xNormalizado = ((tileX % totalTiles) + totalTiles) % totalTiles;
    if (tileY < 0 || tileY >= totalTiles) return null;

    var urls = [
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/' + zoom + '/' + tileY + '/' + xNormalizado,
        'https://mt1.google.com/vt/lyrs=s&x=' + xNormalizado + '&y=' + tileY + '&z=' + zoom
    ];

    for (var i = 0; i < urls.length; i++) {
        try {
            return await carregarImagemComCORS(urls[i]);
        } catch (error) {
            // tenta o proximo provedor de satelite
        }
    }

    return null;
}

async function desenharFundoSateliteTiles(ctx, bbox, largura, altura, padding, viewport) {
    var viewX = (viewport && isFinite(viewport.x)) ? Number(viewport.x) : 0;
    var viewY = (viewport && isFinite(viewport.y)) ? Number(viewport.y) : 0;
    var viewW = (viewport && isFinite(viewport.width)) ? Number(viewport.width) : Number(largura);
    var viewH = (viewport && isFinite(viewport.height)) ? Number(viewport.height) : Number(altura);

    var larguraUtil = Math.max(1, viewW - (padding * 2));
    var alturaUtil = Math.max(1, viewH - (padding * 2));
    var zoom = calcularMelhorZoomBboxMercator(bbox, larguraUtil, alturaUtil);

    var minPxX = lonParaPixelMercator(bbox.minLon, zoom);
    var maxPxX = lonParaPixelMercator(bbox.maxLon, zoom);
    var minPxY = latParaPixelMercator(bbox.maxLat, zoom);
    var maxPxY = latParaPixelMercator(bbox.minLat, zoom);

    var spanX = Math.max(1, maxPxX - minPxX);
    var spanY = Math.max(1, maxPxY - minPxY);
    // Use cover scaling so the satellite fills the entire crop area with no side/top/bottom bars.
    var escala = Math.max(larguraUtil / spanX, alturaUtil / spanY);

    var desenhoLargura = spanX * escala;
    var desenhoAltura = spanY * escala;
    var offsetX = viewX + ((viewW - desenhoLargura) / 2);
    var offsetY = viewY + ((viewH - desenhoAltura) / 2);

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(viewX, viewY, viewW, viewH);

    // Compute visible bounds in tile pixel space and request an overscan ring
    // to avoid tiny seams at the crop edges.
    var visMinPxX = minPxX + ((viewX - offsetX) / escala);
    var visMaxPxX = minPxX + (((viewX + viewW) - offsetX) / escala);
    var visMinPxY = minPxY + ((viewY - offsetY) / escala);
    var visMaxPxY = minPxY + (((viewY + viewH) - offsetY) / escala);

    var totalTiles = Math.pow(2, zoom);
    var tileMinX = Math.floor(visMinPxX / 256) - 1;
    var tileMaxX = Math.floor(visMaxPxX / 256) + 1;
    var tileMinY = Math.max(0, Math.floor(visMinPxY / 256) - 1);
    var tileMaxY = Math.min(totalTiles - 1, Math.floor(visMaxPxY / 256) + 1);

    var carregouAlgumTile = false;

    for (var ty = tileMinY; ty <= tileMaxY; ty++) {
        for (var tx = tileMinX; tx <= tileMaxX; tx++) {
            var tile = await carregarTileSatelite(tx, ty, zoom);
            if (!tile) continue;

            carregouAlgumTile = true;

            var tilePxX = tx * 256;
            var tilePxY = ty * 256;
            var x = offsetX + ((tilePxX - minPxX) * escala);
            var y = offsetY + ((tilePxY - minPxY) * escala);
            var w = 256 * escala;
            var h = 256 * escala;
            ctx.drawImage(tile, x, y, w, h);
        }
    }

    return {
        ok: carregouAlgumTile,
        zoom: zoom,
        minPxX: minPxX,
        minPxY: minPxY,
        escala: escala,
        offsetX: offsetX,
        offsetY: offsetY,
        desenhoLargura: desenhoLargura,
        desenhoAltura: desenhoAltura
    };
}

async function gerarImagemPoligonoSelecionado(consultaProdes) {
    if (!selectedFeatureLayer || !selectedFeatureLayer.toGeoJSON) return null;

    var geojson = selectedFeatureLayer.toGeoJSON();
    var geometry = geojson && geojson.geometry ? geojson.geometry : null;
    if (!geometry) return null;

    var coords = [];
    achatarCoordenadas(geometry, coords);
    if (!coords.length) return null;

    var minX = Infinity;
    var maxX = -Infinity;
    var minY = Infinity;
    var maxY = -Infinity;

    coords.forEach(function(coord) {
        if (!isFinite(coord[0]) || !isFinite(coord[1])) return;
        minX = Math.min(minX, coord[0]);
        maxX = Math.max(maxX, coord[0]);
        minY = Math.min(minY, coord[1]);
        maxY = Math.max(maxY, coord[1]);
    });

    if (!isFinite(minX) || !isFinite(maxX) || !isFinite(minY) || !isFinite(maxY)) return null;

    var canvas = document.createElement('canvas');
    var largura = 1200;
    var padding = 40;
    var margemRelativaBbox = 0.18;
    var spanLonGeom = Math.max(0.0002, maxX - minX) * (1 + (margemRelativaBbox * 2));
    var spanLatPxGeom = Math.max(1, Math.abs(latParaPixelMercator(minY, 10) - latParaPixelMercator(maxY, 10))) * (1 + (margemRelativaBbox * 2));
    var spanLonPxGeom = Math.max(1, lonParaPixelMercator(minX + spanLonGeom, 10) - lonParaPixelMercator(minX, 10));
    var proporcaoMapa = spanLonPxGeom / spanLatPxGeom;
    var alturaCalculada = Math.round(largura / Math.max(0.25, Math.min(4, proporcaoMapa)));
    var altura = Math.max(500, Math.min(900, alturaCalculada));
    canvas.width = largura;
    canvas.height = altura;

    var ctx = canvas.getContext('2d');
    if (!ctx) return null;

    var bordaExterna = 0;
    var escalaItensMapa = 0.82;
    function s(valor) {
        return Number(valor) * escalaItensMapa;
    }
    var raioMapa = s(8);
    var mapaViewportX = bordaExterna;
    var mapaViewportY = bordaExterna;
    var mapaViewportLargura = largura - (bordaExterna * 2);
    var mapaViewportAltura = altura - (bordaExterna * 2);
    var larguraUtil = Math.max(1, mapaViewportLargura - (padding * 2));
    var alturaUtil = Math.max(1, mapaViewportAltura - (padding * 2));
    var bbox = construirBboxPadronizado(minX, maxX, minY, maxY, larguraUtil, alturaUtil);

    function desenharRetanguloArredondado(contexto, x, y, w, h, r) {
        var rr = Math.min(r, w / 2, h / 2);
        contexto.beginPath();
        contexto.moveTo(x + rr, y);
        contexto.arcTo(x + w, y, x + w, y + h, rr);
        contexto.arcTo(x + w, y + h, x, y + h, rr);
        contexto.arcTo(x, y + h, x, y, rr);
        contexto.arcTo(x, y, x + w, y, rr);
        contexto.closePath();
    }

    ctx.save();
    desenharRetanguloArredondado(ctx, mapaViewportX, mapaViewportY, mapaViewportLargura, mapaViewportAltura, raioMapa);
    ctx.clip();

    var base = await desenharFundoSateliteTiles(ctx, bbox, largura, altura, padding, {
        x: mapaViewportX,
        y: mapaViewportY,
        width: mapaViewportLargura,
        height: mapaViewportAltura
    });
    if (!base.ok) {
        console.warn('Nao foi possivel carregar tiles de satelite para o relatorio.');
    }

    function projetar(coord) {
        var px = lonParaPixelMercator(coord[0], base.zoom);
        var py = latParaPixelMercator(coord[1], base.zoom);
        return {
            x: base.offsetX + ((px - base.minPxX) * base.escala),
            y: base.offsetY + ((py - base.minPxY) * base.escala)
        };
    }

    // Slight dark veil to improve readability of polygon colors over satellite imagery.
    ctx.fillStyle = 'rgba(21, 34, 16, 0.14)';
    ctx.fillRect(0, 0, largura, altura);

    ctx.beginPath();
    desenharGeometria(ctx, geometry, projetar);
    ctx.fillStyle = 'rgba(151, 204, 73, 0.42)';
    ctx.strokeStyle = '#f7ffe8';
    ctx.lineWidth = s(4);
    ctx.fill('evenodd');
    ctx.stroke();

    var sobreposicoes = consultaProdes && Array.isArray(consultaProdes.geometriasSobrepostas)
        ? consultaProdes.geometriasSobrepostas
        : [];
    var possuiAreaProdesNoMapa = sobreposicoes.length > 0;

    if (sobreposicoes.length) {
        sobreposicoes.forEach(function(item) {
            if (!item || !item.geometry) return;
            ctx.beginPath();
            desenharGeometria(ctx, item.geometry, projetar);
            ctx.fillStyle = 'rgba(123, 17, 17, 0.58)';
            ctx.strokeStyle = 'rgba(78, 7, 7, 0.9)';
            ctx.lineWidth = s(2);
            ctx.fill('evenodd');
            ctx.stroke();
        });
    }

    // Legend inside the map frame for clearer interpretation in the PDF.
    var legendaW = possuiAreaProdesNoMapa ? s(352) : s(252);
    var legendaH = possuiAreaProdesNoMapa ? s(112) : s(88);
    var legendaX = mapaViewportX + s(20);
    var legendaY = mapaViewportY + mapaViewportAltura - legendaH - s(40);

    ctx.save();
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(247, 250, 246, 0.94)';
    ctx.strokeStyle = 'rgba(31, 63, 34, 0.5)';
    ctx.lineWidth = s(1.1);
    desenharRetanguloArredondado(ctx, legendaX, legendaY, legendaW, legendaH, s(12));
    ctx.fill();
    ctx.stroke();

    var legendaPaddingX = s(16);
    var marcadorTam = s(13);
    var gapTituloItens = s(18);
    var gapEntreItens = s(16);
    var alturaTitulo = s(24);
    var alturaItem = s(20);
    var totalConteudo = alturaTitulo + gapTituloItens + alturaItem + (possuiAreaProdesNoMapa ? (gapEntreItens + alturaItem) : 0);
    var conteudoTop = legendaY + ((legendaH - totalConteudo) / 2);

    ctx.fillStyle = '#1f3f22';
    ctx.font = '500 ' + s(24).toFixed(1) + 'px Poppins, sans-serif';
    ctx.fillText('Legenda', legendaX + legendaPaddingX, conteudoTop + alturaTitulo);

    var item1CentroY = conteudoTop + alturaTitulo + gapTituloItens + (alturaItem / 2);
    ctx.fillStyle = 'rgba(151, 204, 73, 0.85)';
    ctx.fillRect(legendaX + legendaPaddingX, item1CentroY - (marcadorTam / 2), marcadorTam, marcadorTam);
    ctx.strokeStyle = '#f7ffe8';
    ctx.lineWidth = s(1);
    ctx.strokeRect(legendaX + legendaPaddingX, item1CentroY - (marcadorTam / 2), marcadorTam, marcadorTam);

    ctx.fillStyle = '#2e3c2f';
    ctx.font = '500 ' + s(20).toFixed(1) + 'px Poppins, sans-serif';
    ctx.fillText('Polígono do imóvel', legendaX + legendaPaddingX + s(20), item1CentroY + s(7));

    if (possuiAreaProdesNoMapa) {
        var item2CentroY = item1CentroY + alturaItem + gapEntreItens;
        ctx.fillStyle = 'rgba(123, 17, 17, 0.85)';
        ctx.fillRect(legendaX + legendaPaddingX, item2CentroY - (marcadorTam / 2), marcadorTam, marcadorTam);
        ctx.strokeStyle = 'rgba(78, 7, 7, 0.95)';
        ctx.lineWidth = s(1);
        ctx.strokeRect(legendaX + legendaPaddingX, item2CentroY - (marcadorTam / 2), marcadorTam, marcadorTam);
        ctx.fillStyle = '#2e3c2f';
        ctx.fillText('Área desmatada PRODES', legendaX + legendaPaddingX + s(20), item2CentroY + s(7));
    }
    ctx.restore();

    ctx.restore();

    // Thicker inner frame plus outer rectangular frame around the full map.
    ctx.save();
    ctx.shadowColor = 'rgba(20, 34, 18, 0.34)';
    ctx.shadowBlur = s(8);
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = s(2);
    desenharRetanguloArredondado(ctx, mapaViewportX + s(1), mapaViewportY + s(1), mapaViewportLargura - s(2), mapaViewportAltura - s(2), raioMapa);
    ctx.strokeStyle = 'rgba(28, 56, 30, 0.9)';
    ctx.lineWidth = s(4);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    desenharRetanguloArredondado(ctx, mapaViewportX + s(5), mapaViewportY + s(5), mapaViewportLargura - s(10), mapaViewportAltura - s(10), Math.max(s(3), raioMapa - s(2)));
    ctx.strokeStyle = 'rgba(241, 248, 236, 0.92)';
    ctx.lineWidth = s(2.2);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.beginPath();
    ctx.rect(mapaViewportX - s(7), mapaViewportY - s(7), mapaViewportLargura + s(14), mapaViewportAltura + s(14));
    ctx.strokeStyle = 'rgba(32, 57, 34, 0.72)';
    ctx.lineWidth = s(2.6);
    ctx.stroke();
    ctx.restore();

    return {
        dataUrl: canvas.toDataURL('image/png'),
        mapaInicioX: base.offsetX,
        mapaLargura: base.desenhoLargura
    };
}

function carregarImagemDataUrl(url) {
    return fetch(url)
        .then(function(response) {
            if (!response.ok) {
                throw new Error('Falha ao baixar imagem: ' + response.status);
            }
            return response.blob();
        })
        .then(function(blob) {
            return new Promise(function(resolve, reject) {
                var reader = new FileReader();
                reader.onloadend = function() {
                    resolve(reader.result);
                };
                reader.onerror = function() {
                    reject(new Error('Falha ao converter imagem para Data URL.'));
                };
                reader.readAsDataURL(blob);
            });
        });
}

async function obterLogoRelatorioDataUrl() {
    if (logoRelatorioDataUrl) return logoRelatorioDataUrl;

    try {
        logoRelatorioDataUrl = await carregarImagemDataUrl(logoRelatorioUrl);
        return logoRelatorioDataUrl;
    } catch (error) {
        console.warn('Nao foi possivel carregar a logo do relatorio.', error);
        return null;
    }
}

function normalizarChaveParaRelatorio(chave) {
    return String(chave || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/[^a-z0-9]/g, '');
}

function ehChaveAmbientalCarRelatorio(chave) {
    var chaveNorm = normalizarChaveParaRelatorio(chave);
    return chaveNorm === 'codigocar' || chaveNorm === 'situacacar' || chaveNorm === 'situacaocar';
}

function tituloCasoRelatorio(texto) {
    return String(texto || '').replace(/\b\w/g, function(letra) {
        return letra.toUpperCase();
    });
}

function obterMetaCampoRelatorio(chave) {
    var chaveNorm = normalizarChaveParaRelatorio(chave);
    var metadados = {
        id: { ocultar: true, rotulo: 'ID' },
        nmimovel: { rotulo: 'Nome do Imóvel' },
        name: { rotulo: 'Nome do Imóvel' },
        nome: { rotulo: 'Nome do Imóvel' },
        matricula: { rotulo: 'Matrícula' },
        ccir: { rotulo: 'CCIR' },
        cib: { rotulo: 'CIB' },
        codigocar: { rotulo: 'Código CAR' },
        situacacar: { rotulo: 'Situação CAR' },
        situacaocar: { rotulo: 'Situação CAR' },
        declarante: { rotulo: 'Declarante' },
        area: { rotulo: 'Área (ha)' },
        areaha: { rotulo: 'Área (ha)' },
        municipio: { rotulo: 'Município' },
        estado: { rotulo: 'Estado' }
    };

    if (metadados[chaveNorm]) {
        return metadados[chaveNorm];
    }

    var rotuloFallback = String(chave || '')
        .replace(/_/g, ' ')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .trim();

    return {
        rotulo: tituloCasoRelatorio(rotuloFallback)
    };
}

function montarDadosRelatorioPorCategoria(props) {
    var fundiarios = [];
    var ambientais = [];

    Object.keys(props || {}).forEach(function(chave) {
        var valor = props[chave];
        if (valor === null || valor === undefined || valor === '') return;

        var meta = obterMetaCampoRelatorio(chave);
        if (meta.ocultar) return;

        var item = {
            chave: meta.rotulo || String(chave),
            valor: (typeof valor === 'object') ? JSON.stringify(valor) : String(valor)
        };

        if (ehChaveAmbientalCarRelatorio(chave)) {
            ambientais.push(item);
        } else {
            fundiarios.push(item);
        }
    });

    return {
        fundiarios: fundiarios,
        ambientais: ambientais
    };
}

async function gerarRelatorio() {

    }

    }

        });

        var geojsonSelecionado = selectedFeatureLayer && selectedFeatureLayer.toGeoJSON ? selectedFeatureLayer.toGeoJSON() : null;
        var geometriaImovel = geojsonSelecionado && geojsonSelecionado.geometry ? geojsonSelecionado.geometry : null;
        var ccirImovelSelecionado = valorCampoNormalizado(props, ['CCIR', 'ccir'], 'Não informado');
        var relacionamentosConformidade = detectarRelacionamentosConformidade(geojsonSelecionado, colecaoImoveisFeatures);
        var resumoConformidade = {
            ccirImovelSelecionado: ccirImovelSelecionado,
            totalImoveisContinuos: relacionamentosConformidade.continuidades.length,
            imoveisContinuos: relacionamentosConformidade.continuidades,
            totalInconsistencias: relacionamentosConformidade.inconsistencias.length,
            inconsistencias: relacionamentosConformidade.inconsistencias
        };
        var avisosConformidade = await gerarAnaliseConformidadeIA(resumoConformidade);
        var turfRef = window.turf;
        var areaTotalImovelHa = (turfRef && geometriaImovel)
            ? (turfRef.area(turfRef.feature(geometriaImovel)) / 10000)
            : Number(valorCampo(props, ['__rea__ha_', 'area', 'Área (ha)', 'area_ha'], 0));

        var consultaProdes = await consultarDesmatamentoProdesNoImovel(geometriaImovel);
        var areaSobrepostaProdesHa = Number(consultaProdes && consultaProdes.areaSobrepostaEstimHa);
        var possuiIntersecaoProdes = isFinite(areaSobrepostaProdesHa) && areaSobrepostaProdesHa > 0;
        var pageWidth = doc.internal.pageSize.getWidth();
        var y = 0;
        var fatorEspacamentoTitulo = 1.5;
        var espacamentoLetrasParagrafo = 0.22;

        var logoDataUrl = await obterLogoRelatorioDataUrl();

        function desenharCabecalhoRelatorio() {
            doc.setFillColor(31, 44, 15);
            doc.rect(0, 0, pageWidth, 78, 'F');

            if (logoDataUrl) {
                var formatoLogo = logoDataUrl.indexOf('data:image/jpeg') === 0 ? 'JPEG' : 'PNG';
                var propsLogo = doc.getImageProperties(logoDataUrl);
                var maxLogoWidth = 170;
                var maxLogoHeight = 48;
                var escalaLogo = Math.min(maxLogoWidth / propsLogo.width, maxLogoHeight / propsLogo.height);
                var logoWidth = propsLogo.width * escalaLogo;
                var logoHeight = propsLogo.height * escalaLogo;
                var logoX = pageWidth - 42 - logoWidth;
                var logoY = (78 - logoHeight) / 2;
                doc.addImage(logoDataUrl, formatoLogo, logoX, logoY, logoWidth, logoHeight, undefined, 'FAST');
            }

            doc.setTextColor(255, 255, 255);
            doc.setFontSize(20);
            doc.text('Gestão Fundiária', 42, 49);
        }

        desenharCabecalhoRelatorio();

        y = 112;
        doc.setTextColor(31, 44, 15);
        doc.setFontSize(18);
        doc.text(nomeImovel, 42, y);

        y += 24;
        doc.setFontSize(10);
        doc.setTextColor(90, 110, 90);
        doc.text('Data de geração: ' + new Date().toLocaleString('pt-BR'), 42, y);

        y += 24;
        doc.setDrawColor(168, 205, 105);
        doc.setLineWidth(1.1);
        doc.line(42, y, pageWidth - 42, y);

        function garantirEspaco(alturaNecessaria) {
            if (y + alturaNecessaria <= 780) return;
            doc.addPage();
            y = 112;
        }

        function garantirTituloComConteudo(alturaTitulo, alturaConteudoMinima) {
            garantirEspaco(alturaTitulo + alturaConteudoMinima);
        }

        function renderTextoJustificado(linhas, x, largura, alturaLinha) {
            doc.setCharSpace(espacamentoLetrasParagrafo);
            linhas.forEach(function(linha, idx) {
                var isUltima = idx === linhas.length - 1;
                var palavras = linha.trim().split(' ');
                if (isUltima || palavras.length <= 1 || linha.trim() === '') {
                    doc.text(linha, x, y);
                } else {
                    var larguraPalavras = palavras.reduce(function(soma, p) { return soma + doc.getTextWidth(p); }, 0);
                    var espaco = (largura - larguraPalavras) / (palavras.length - 1);
                    var cx = x;
                    palavras.forEach(function(palavra) {
                        doc.text(palavra, cx, y);
                        cx += doc.getTextWidth(palavra) + espaco;
                    });
                }
                y += alturaLinha;
            });
            doc.setCharSpace(0);
        }

        function renderSecaoDados(tituloSecao, itens) {

            if (!paragrafos.length) {
                paragrafos = ['Nenhuma inconsistência de conformidade foi identificada entre áreas em continuidade para o imóvel selecionado.'];
            }

            var alturaMinima = 24;
            paragrafos.forEach(function(texto) {
                var conteudo = String(texto || '').replace(/\s*\n+\s*/g, ' ').trim();

            garantirTituloComConteudo(18, alturaMinima);

            doc.setFontSize(13);
            doc.setTextColor(31, 44, 15);
            doc.text(tituloSecao, 42, y);
            y += Math.round(22 * fatorEspacamentoTitulo);

                var linhas = doc.splitTextToSize(conteudo, pageWidth - 84);
                garantirEspaco((linhas.length * 16) + 8);

                doc.setFontSize(11);
                doc.setTextColor(30, 40, 35);
                renderTextoJustificado(linhas, 42, pageWidth - 84, 16);

                    y += 8;
                }

        doc.setTextColor(31, 44, 15);
        doc.text('Dados do Quadro de Informações', 42, y);
        y += Math.round(20 * fatorEspacamentoTitulo);

        renderSecaoDados('Dados Fundiários', dadosFundiarios);
        y += 10;
        renderSecaoAnalitica('Análise de Conformidade', avisosConformidade);
        y += 22;
        renderSecaoDados('Dados Ambientais', dadosAmbientais);

        y += 8;

        if (possuiIntersecaoProdes) {
            var resumoAmbientalIA = {
                areaTotalHa: areaTotalImovelHa,
                prodes: consultaProdes,
                caso: consultaProdes.temDesmatamento
                    ? 'com_desmatamento_prodes_desde_2008'
                    : 'sem_desmatamento_prodes_desde_2008'
            };
            var interpretacaoAmbiental = await gerarInterpretacaoProdesIA(resumoAmbientalIA);

            var areaTotalTexto = formatarNumeroPtBr(areaTotalImovelHa || 0, 2);
            var areaDesmatadaTexto = consultaProdes.disponivel
                ? formatarNumeroPtBr(consultaProdes.areaSobrepostaEstimHa || 0, 2)
                : 'Indisponível';
            var percentualDesmatadoTexto = consultaProdes.disponivel
                ? formatarNumeroPtBr(consultaProdes.percentualImovel || 0, 2) + '%'
                : 'Indisponível';
            var anosCodigosTexto = (consultaProdes.codigosDetectados && consultaProdes.codigosDetectados.length)
                ? consultaProdes.codigosDetectados.map(function(c) { return Number(String(c).replace(/^d/i, '')); }).filter(function(n) { return isFinite(n); }).join(', ')
                : 'Não identificado';

            renderSecaoDados('Análise Ambiental', [
                { chave: 'Área total do imóvel (ha)', valor: areaTotalTexto },
                { chave: 'Total de áreas desmatadas (ha)', valor: areaDesmatadaTexto },
                { chave: 'Percentual do imóvel desmatado', valor: percentualDesmatadoTexto },
                { chave: 'Anos com ocorrência de desmatamento', valor: anosCodigosTexto },
                { chave: 'Registros de desmatamento detectados', valor: String(consultaProdes.totalPoligonosIntersectantes || 0) }
            ]);

            doc.setFontSize(11);
            var interpretacaoQuebrada = doc.splitTextToSize(interpretacaoAmbiental, pageWidth - 84);
            y += 8;
            garantirTituloComConteudo(18, (interpretacaoQuebrada.length * 16) + 24);

            doc.setFontSize(13);
            doc.setTextColor(31, 44, 15);
            doc.text('Levantamento PRODES', 42, y);

            y += Math.round(22 * fatorEspacamentoTitulo);
            doc.setFontSize(11);
            doc.setTextColor(30, 40, 35);
            renderTextoJustificado(interpretacaoQuebrada, 42, pageWidth - 84, 16);

        }

        var renderMapa = await gerarImagemPoligonoSelecionado(consultaProdes);
        if (renderMapa && renderMapa.dataUrl) {
            if (possuiIntersecaoProdes) {
                doc.addPage();
                y = 112;
            } else {
                y += 16;
            }
            var margemLateralMapa = 58;
            var imgMaxW = pageWidth - (margemLateralMapa * 2);
            var alturaTituloMapa = Math.round(14 * fatorEspacamentoTitulo) + 10;
            var alturaMinimaMapa = 170;
            var alturaDisponivelPagina = 780 - y - alturaTituloMapa - 12;

            if (alturaDisponivelPagina < alturaMinimaMapa) {
                doc.addPage();
                y = 112;
                alturaDisponivelPagina = 780 - y - alturaTituloMapa - 12;
            }

            var imgMaxH = Math.min(320, Math.max(alturaMinimaMapa, alturaDisponivelPagina));
            var propsImagem = doc.getImageProperties(renderMapa.dataUrl);
            var escalaImagem = Math.min(imgMaxW / propsImagem.width, imgMaxH / propsImagem.height);
            var imgW = propsImagem.width * escalaImagem;
            var imgH = propsImagem.height * escalaImagem;
            garantirEspaco(imgH + alturaTituloMapa + 8);

            doc.setFontSize(13);
            doc.setTextColor(31, 44, 15);
            doc.text('Área do Imóvel', 42, y);

            y += Math.round(14 * fatorEspacamentoTitulo);
            var imgX = margemLateralMapa + ((imgMaxW - imgW) / 2);
            var imgY = y;
            doc.addImage(renderMapa.dataUrl, 'PNG', imgX, imgY, imgW, imgH, undefined, 'FAST');
            y += imgH;
        }

        var totalPages = doc.internal.getNumberOfPages();
        for (var p = 1; p <= totalPages; p++) {
            doc.setPage(p);
            desenharCabecalhoRelatorio();
            doc.setFontSize(9);
            doc.setTextColor(100, 110, 100);
            doc.text('Gestão Fundiária', 42, 820);
            doc.text('Página ' + p + ' de ' + totalPages, pageWidth - 100, 820);
        }

        var nomeArquivo = 'relatorio_' + limparNomeArquivo(nomeImovel || 'imovel') + '.pdf';
        doc.save(nomeArquivo);
    } catch (error) {
        console.error('Erro ao gerar relatório PDF:', error);
        alert('Não foi possível gerar o relatório PDF.\n' + (error.message || error));
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.innerText = 'Gerar Relatório';
        }
    }
}

var LOGIN_MAX_TENTATIVAS = 5;
var sessaoAutenticada = false;

function normalizarUsuarioLogin(usuario) {
    return String(usuario || '').trim().toLowerCase();
}

function obterBotaoLogin() {
    return document.getElementById('login-submit-btn');
}

function alternarVisibilidadeSenha() {
    var senhaInput = document.getElementById('pass');
    var toggleBtn = document.getElementById('toggle-pass');
    if (!senhaInput || !toggleBtn) return;

    var mostrando = senhaInput.type === 'text';
    toggleBtn.classList.add('is-active');

    setTimeout(function() {
        senhaInput.type = mostrando ? 'password' : 'text';
        toggleBtn.innerHTML = mostrando
            ? '<i class="fas fa-eye"></i>'
            : '<i class="fas fa-eye-slash"></i>';
        toggleBtn.setAttribute('aria-label', mostrando ? 'Mostrar senha' : 'Ocultar senha');
        toggleBtn.setAttribute('title', mostrando ? 'Mostrar senha' : 'Ocultar senha');
    }, 70);

    setTimeout(function() {
        toggleBtn.classList.remove('is-active');
    }, 220);
}

function atualizarStatusLogin(mensagem, tipo) {
    var statusEl = document.getElementById('login-status');
    if (!statusEl) return;

    statusEl.textContent = mensagem || '';
    statusEl.style.color = tipo === 'sucesso'
        ? '#d8ebb6'
        : (tipo === 'alerta' ? '#ffe9a8' : '#ffd6d6');
}

function usuarioEstaAutenticado() {
    return Boolean(sessaoAutenticada);
}

async function requisicaoJson(url, opcoes) {
    var config = Object.assign({
        credentials: 'same-origin',
        headers: {
            'Accept': 'application/json'
        }
    }, opcoes || {});

    if (config.body) {
        config.headers = Object.assign({}, config.headers || {}, {
            'Content-Type': 'application/json'
        });
    }

    var response = await fetch(url, config);
    var texto = await response.text();
    var dados = {};

    if (texto) {
        try {
            dados = JSON.parse(texto);
        } catch (error) {
            dados = { message: texto };
        }
    }

    if (!response.ok) {
        var erro = new Error(dados.message || ('Falha na requisição: ' + response.status));
        erro.status = response.status;
        erro.data = dados;
        throw erro;
    }

    return dados;
}

function exibirTelaLogin() {
    var telaLogin = document.getElementById('login');
    var telaMapa = document.getElementById('mapa-container');
    var botaoEntrar = obterBotaoLogin();

    sessaoAutenticada = false;

    if (telaLogin) {
        telaLogin.classList.remove('carregando');
        telaLogin.style.display = 'flex';
    }

    if (telaMapa) {
        telaMapa.style.display = 'none';
    }

    if (botaoEntrar) {
        botaoEntrar.disabled = false;
    }
}

function abrirMapaAutenticado() {
    var telaLogin = document.getElementById('login');
    var telaMapa = document.getElementById('mapa-container');

    sessaoAutenticada = true;

    if (!telaLogin || !telaMapa) {
        return;
    }

    telaLogin.style.display = 'none';
    telaMapa.style.display = 'flex';

    if (!mapaInicializado) {
        iniciarMapa();
        initSectionToggle();
    }
}

async function verificarSessaoServidor() {
    try {
        var dados = await requisicaoJson('/api/session');
        if (dados && dados.authenticated) {
            atualizarStatusLogin('Sessão ativa. Carregando mapa...', 'sucesso');
            abrirMapaAutenticado();
            return;
        }
    } catch (error) {
        console.warn('Não foi possível verificar a sessão atual.', error);
    }

    exibirTelaLogin();
}

async function encerrarSessao() {
    try {
        await requisicaoJson('/api/logout', { method: 'POST' });
    } catch (error) {
        console.warn('Falha ao encerrar a sessão no servidor.', error);
    }

    var usuarioInput = document.getElementById('user');
    var senhaInput = document.getElementById('pass');
    if (usuarioInput) usuarioInput.value = '';
    if (senhaInput) senhaInput.value = '';

    atualizarStatusLogin('', 'alerta');
    exibirTelaLogin();
}

function prepararEventosLogin() {
    var campos = [document.getElementById('user'), document.getElementById('pass')];

    campos.forEach(function(campo) {
        if (!campo || campo.dataset.loginReady === 'true') return;

        campo.dataset.loginReady = 'true';
        campo.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                login();
            }
        });
    });

    verificarSessaoServidor();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', prepararEventosLogin);
} else {
    prepararEventosLogin();
}

async function login() {
    var usuarioInput = document.getElementById('user');
    var senhaInput = document.getElementById('pass');
    var usuario = normalizarUsuarioLogin(usuarioInput ? usuarioInput.value : '');
    var senha = senhaInput ? senhaInput.value : '';
    var botaoEntrar = obterBotaoLogin();
    var telaLogin = document.getElementById('login');

    if (!usuario || !senha) {
        atualizarStatusLogin('Informe usuário e senha para continuar.', 'alerta');
        alert('Informe usuário e senha.');
        return;
    }

    try {
        if (botaoEntrar) {
            botaoEntrar.disabled = true;
        }

        atualizarStatusLogin('', 'alerta');

        var resposta = await requisicaoJson('/api/login', {
            method: 'POST',
            body: JSON.stringify({
                usuario: usuario,
                senha: senha
            })
        });

        if (senhaInput) {
            senhaInput.value = '';
        }

        atualizarStatusLogin('', 'sucesso');
        if (telaLogin) {
            telaLogin.classList.add('carregando');
        }

        setTimeout(function() {
            abrirMapaAutenticado();
        }, 3000);
    } catch (error) {
        if (botaoEntrar) {
            botaoEntrar.disabled = false;
        }
        if (senhaInput) {
            senhaInput.value = '';
        }

        console.error('Falha ao validar login no backend:', error);

        var mensagem = error.message || 'Não foi possível validar o acesso.';
        if (error.data && typeof error.data.remainingAttempts === 'number' && error.status === 401) {
            var usadas = LOGIN_MAX_TENTATIVAS - Number(error.data.remainingAttempts || 0);
            mensagem += ' Tentativa ' + usadas + ' de ' + LOGIN_MAX_TENTATIVAS + '.';
        }

        atualizarStatusLogin(mensagem, error.status === 429 ? 'alerta' : 'erro');
        alert(mensagem);
    }
}

function iniciarMapa() {
    if (!usuarioEstaAutenticado()) {
        atualizarStatusLogin('Faça login antes de acessar o mapa.', 'alerta');
        return;
    }

    if (mapaInicializado) {
        return;
    }
    mapaInicializado = true;

    var map = L.map('map', { zoomControl: false }).setView([-32.03, -52.10], 13);
    setTimeout(function() { map.invalidateSize(); }, 100);
    var tileRenderOptions = {
        detectRetina: false,
        keepBuffer: 1,
        updateWhenIdle: true,
        updateWhenZooming: false
    };

    // Adicionar controle de zoom na parte inferior direita
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 🗺️ Ruas
    var street = L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        Object.assign({
            attribution: '© OpenStreetMap',
            maxNativeZoom: 17,
            maxZoom: 19
        }, tileRenderOptions)
    );

    // 🛰️ Satélite
    var satellite = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        Object.assign({
            attribution: 'Tiles © Esri',
            maxNativeZoom: 17,
            maxZoom: 19
        }, tileRenderOptions)
    ).addTo(map);

    var googleHybrid = L.tileLayer(
        'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
        Object.assign({
            attribution: 'Mapa © Google',
            maxNativeZoom: 18,
            maxZoom: 19
        }, tileRenderOptions)
    );

    function registrarFallback(layer, nomeCamada) {
        var fallbackAplicado = false;

        layer.on('tileerror', function() {
            if (fallbackAplicado) {
                return;
            }

            fallbackAplicado = true;
            console.warn('Falha ao carregar tiles da camada ' + nomeCamada + '. Alternando para Street.');

            if (map.hasLayer(layer)) {
                map.removeLayer(layer);
            }

            if (!map.hasLayer(street)) {
                street.addTo(map);
            }
        });
    }

    registrarFallback(satellite, 'Satellite');
    registrarFallback(googleHybrid, 'Google Hybrid');

    var baseMaps = {
        "Satellite": satellite,
        "Street": street,
        "Google Hybrid": googleHybrid
    };

    var layerControl = L.control.layers(baseMaps, {}).addTo(map);

    var mapSearchInput = document.getElementById('map-search-input');
    var mapSearchBtn = document.getElementById('map-search-btn');
    var mapSearchResults = document.getElementById('map-search-results');

    function carregarGeojson(url, nomeCamada) {
        return fetch(url, {
            credentials: 'same-origin'
        })
            .then(function(response) {
                if (response.status === 401) {
                    sessaoAutenticada = false;
                    exibirTelaLogin();
                    atualizarStatusLogin('Sua sessão expirou. Faça login novamente.', 'alerta');
                    throw new Error('Sessão expirada. Faça login novamente.');
                }

                if (!response.ok) {
                    throw new Error('Falha ao carregar ' + nomeCamada + ': ' + response.status);
                }
                return response.json();
            });
    }

    function normalizarChavePropriedade(chave) {
        return String(chave || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase()
            .replace(/[^a-z0-9]/g, '');
    }

    function ehChaveAmbientalCar(chave) {
        var chaveNorm = normalizarChavePropriedade(chave);
        return chaveNorm === 'codigocar' || chaveNorm === 'situacacar' || chaveNorm === 'situacaocar';
    }

    var metadadosCampos = {
        id: { ocultar: true, rotulo: 'ID', icone: 'fa-hashtag' },
        nmimovel: { rotulo: 'Nome do Imóvel', icone: 'fa-map-marker-alt' },
        name: { rotulo: 'Nome do Imóvel', icone: 'fa-map-marker-alt' },
        nome: { rotulo: 'Nome do Imóvel', icone: 'fa-map-marker-alt' },
        matricula: { rotulo: 'Matrícula', icone: 'fa-border-all' },
        ccir: { rotulo: 'CCIR', icone: 'fa-id-card' },
        cib: { rotulo: 'CIB', icone: 'fa-file-signature' },
        codigocar: { rotulo: 'Código CAR', icone: 'fa-leaf' },
        situacacar: { rotulo: 'Situação CAR', icone: 'fa-seedling' },
        situacaocar: { rotulo: 'Situação CAR', icone: 'fa-seedling' },
        declarante: { rotulo: 'Declarante', icone: 'fa-user' },
        area: { rotulo: 'Área (ha)', icone: 'fa-ruler-combined' },
        areaha: { rotulo: 'Área (ha)', icone: 'fa-ruler-combined' },
        municipio: { rotulo: 'Município', icone: 'fa-city' },
        estado: { rotulo: 'Estado', icone: 'fa-flag' }
    };

    function tituloCaso(texto) {
        return String(texto || '').replace(/\b\w/g, function(letra) {
            return letra.toUpperCase();
        });
    }

    function obterMetaCampo(chave) {
        var chaveNorm = normalizarChavePropriedade(chave);
        var meta = metadadosCampos[chaveNorm] || null;
        if (meta) {
            return meta;
        }

        var rotuloFallback = String(chave || '')
            .replace(/_/g, ' ')
            .replace(/([a-z])([A-Z])/g, '$1 $2')
            .trim();

        return {
            rotulo: tituloCaso(rotuloFallback),
            icone: 'fa-file-alt'
        };
    }

    function coordenadaPareceUTM(coord) {
        if (!Array.isArray(coord) || coord.length < 2) return false;
        var x = Number(coord[0]);
        var y = Number(coord[1]);
        if (!isFinite(x) || !isFinite(y)) return false;
        return Math.abs(x) > 180 || Math.abs(y) > 90;
    }

    function transformarCoordenadasRecursivo(coords, transformador) {
        if (!Array.isArray(coords)) return coords;
        if (coords.length >= 2 && typeof coords[0] === 'number' && typeof coords[1] === 'number') {
            return transformador(coords);
        }
        return coords.map(function(item) {
            return transformarCoordenadasRecursivo(item, transformador);
        });
    }

    function normalizarGeoJsonParaLeaflet(geojson) {
        if (!geojson || typeof geojson !== 'object') return geojson;

        var nomeCrs = geojson.crs && geojson.crs.properties && geojson.crs.properties.name
            ? String(geojson.crs.properties.name)
            : '';
        var usa31982 = /31982/.test(nomeCrs);

        if (typeof proj4 === 'undefined') {
            return geojson;
        }

        proj4.defs('EPSG:31982', '+proj=utm +zone=22 +south +datum=SIRGAS2000 +units=m +no_defs');

        function converterCoord(coord) {
            if (!coordenadaPareceUTM(coord) && !usa31982) {
                return coord;
            }
            var convertido = proj4('EPSG:31982', 'EPSG:4326', [Number(coord[0]), Number(coord[1])]);
            return [convertido[0], convertido[1]];
        }

        var copia = JSON.parse(JSON.stringify(geojson));

        if (copia.type === 'FeatureCollection' && Array.isArray(copia.features)) {
            copia.features.forEach(function(feature) {
                if (!feature || !feature.geometry || !feature.geometry.coordinates) return;
                feature.geometry.coordinates = transformarCoordenadasRecursivo(feature.geometry.coordinates, converterCoord);
            });
        } else if (copia.type === 'Feature' && copia.geometry && copia.geometry.coordinates) {
            copia.geometry.coordinates = transformarCoordenadasRecursivo(copia.geometry.coordinates, converterCoord);
        } else if (copia.coordinates) {
            copia.coordinates = transformarCoordenadasRecursivo(copia.coordinates, converterCoord);
        }

        if (copia.crs) {
            delete copia.crs;
        }

        return copia;
    }

    carregarGeojson('teste.geojson', 'imoveis')
      .then(function(data) {
          data = normalizarGeoJsonParaLeaflet(data);
          if (data && data.type === 'FeatureCollection' && Array.isArray(data.features)) {
              colecaoImoveisFeatures = data.features;
          } else if (data && data.type === 'Feature') {
              colecaoImoveisFeatures = [data];
          } else {
              colecaoImoveisFeatures = [];
          }
          var areaLayer = L.geoJSON(data, {
              style: function(feature) {
                  return {color: '#ffffff', weight: 3, opacity: 1, fillColor: '#b7ff00', fillOpacity: 0.2};
              },
              onEachFeature: function(feature, layer) {
                  layer.on('mouseover', function() {
                      this.setStyle({
                          weight: 5,
                          color: '#f7ffe8',
                          fillColor: '#d6ff7a',
                          fillOpacity: 0.34
                      });

                      if (this._path) {
                          L.DomUtil.addClass(this._path, 'imovel-hover');
                      }

                      if (this.bringToFront) {
                          this.bringToFront();
                      }
                  });

                  layer.on('mouseout', function() {
                      if (this._path) {
                          L.DomUtil.removeClass(this._path, 'imovel-hover');
                      }
                      areaLayer.resetStyle(this);
                  });

                  layer.on('click', function(e) {
                      var props = feature.properties || {};

                      var formatItem = function(icon, label, value) {
                          if (value === null || value === undefined || value === '') return '';
                          var valorTexto = (typeof value === 'object') ? JSON.stringify(value) : String(value);
                          return '<div class="section-content-item">'
                               + '<i class="fas ' + icon + '"></i>'
                               + '<div class="section-content-text">'
                               + '<span class="section-content-label">' + label + '</span>'
                               + '<span class="section-content-value">' + valorTexto + '</span>'
                               + '</div></div>';
                      };

                      var fundiariosItems = '';
                      var ambientaisItems = '';

                      Object.keys(props).forEach(function(chave) {
                          var valor = props[chave];
                          if (valor === null || valor === undefined || valor === '') return;

                          var meta = obterMetaCampo(chave);
                          if (meta.ocultar) return;

                          if (ehChaveAmbientalCar(chave)) {
                              ambientaisItems += formatItem(meta.icone || 'fa-leaf', meta.rotulo || chave, valor);
                          } else {
                              fundiariosItems += formatItem(meta.icone || 'fa-file-alt', meta.rotulo || chave, valor);
                          }
                      });

                      var imovelName = props.NM_Imovel || props.Name || props.name || props.nome || 'Nome do Imóvel';
                      selectedFeatureProps = props;
                      selectedFeatureName = imovelName;
                      selectedFeatureLayer = layer;
                      
                      var painelTitle = document.getElementById('painel-title-text');
                      painelTitle.innerText = imovelName;

                      var reportBtn = document.getElementById('btn-gerar-relatorio');
                      if (reportBtn) {
                          reportBtn.style.display = 'inline-block';
                      }

                      var fundiariosContent = document.getElementById('section-fundiarios');
                      var ambientaisContent = document.getElementById('section-ambientais');

                      fundiariosContent.innerHTML = fundiariosItems || '<p>Sem dados fundiários disponíveis</p>';
                      ambientaisContent.innerHTML = ambientaisItems || '<p>Sem dados ambientais disponíveis</p>';

                      fundiariosContent.classList.remove('hidden');
                      ambientaisContent.classList.add('hidden');
                      document.querySelector('#conteudo-fundiarios .section-header').classList.add('open');
                      document.querySelector('#conteudo-ambientais .section-header').classList.remove('open');

                      var painel = document.getElementById('painel');
                      painel.classList.remove('inativo');
                      painel.classList.add('ativo');
                      L.DomEvent.stopPropagation(e);
                  });
              }
          }).addTo(map);

          function obterNomeImovel(props) {
              return props.NM_Imovel || props.Name || props.name || props.nome || 'Imóvel sem nome';
          }

          function obterMatriculaImovel(props) {
              return props.Matricula || props.matricula || props.Matr__cula || 'Sem matrícula';
          }

          function obterCamposPesquisa(props) {
              return [
                  { chave: 'Nome', valor: props.NM_Imovel || props.Name || props.name || props.nome || '' },
                  { chave: 'Matrícula', valor: props.Matricula || props.matricula || props.Matr__cula || '' }
              ];
          }

          function buscarCamadasPorTermo(termo, limite) {
              var resultados = [];
              var termoNormalizado = normalizarTextoBusca(termo);

              if (!termoNormalizado) {
                  return resultados;
              }

              areaLayer.eachLayer(function(layer) {
                  var props = (layer.feature && layer.feature.properties) ? layer.feature.properties : {};
                  var camposPesquisa = obterCamposPesquisa(props);

                  for (var i = 0; i < camposPesquisa.length; i++) {
                      var chave = camposPesquisa[i].chave;
                      var valor = camposPesquisa[i].valor;
                      if (valor === null || valor === undefined) continue;

                      var valorTexto = normalizarTextoBusca(valor);
                      if (valorTexto.indexOf(termoNormalizado) !== -1) {
                          resultados.push({
                              layer: layer,
                              nome: obterNomeImovel(props),
                              chave: chave,
                              valor: String(valor)
                          });
                          break;
                      }
                  }
              });

              return typeof limite === 'number' ? resultados.slice(0, limite) : resultados;
          }

          function selecionarResultado(layer, textoInput) {
              if (mapSearchInput && textoInput) {
                  mapSearchInput.value = textoInput;
              }

              if (mapSearchResults) {
                  mapSearchResults.classList.remove('show');
                  mapSearchResults.innerHTML = '';
              }

              if (layer.getBounds && layer.getBounds().isValid()) {
                  map.flyToBounds(layer.getBounds(), {
                      padding: [24, 24],
                      duration: 1.1,
                      easeLinearity: 0.25,
                      maxZoom: 17
                  });
              }

              layer.fire('click');
          }

          function renderSugestoes() {
              if (!mapSearchInput || !mapSearchResults) return;

              var termoBruto = mapSearchInput.value || '';
              var termo = normalizarTextoBusca(termoBruto);

              mapSearchResults.innerHTML = '';
              mapSearchResults.classList.remove('show');

              if (!termo) return;

              var sugestoes = buscarCamadasPorTermo(termo, 8);
              if (!sugestoes.length) return;

              sugestoes.forEach(function(item) {
                  var li = document.createElement('li');
                  li.innerHTML = '<span class="map-search-result-name">' + item.nome + '</span>'
                      + '<span class="map-search-result-meta">Matrícula: ' + obterMatriculaImovel(item.layer.feature && item.layer.feature.properties ? item.layer.feature.properties : {}) + '</span>';
                  li.addEventListener('click', function() {
                      selecionarResultado(item.layer, item.nome);
                  });
                  mapSearchResults.appendChild(li);
              });

              mapSearchResults.classList.add('show');
          }

          function pesquisarArea() {
              var termo = normalizarTextoBusca(mapSearchInput && mapSearchInput.value ? mapSearchInput.value : '');
              if (!termo) return;

              var resultados = buscarCamadasPorTermo(termo, 1);
              if (!resultados.length) {
                  alert('Nenhuma área encontrada para: ' + (mapSearchInput ? mapSearchInput.value : termo));
                  return;
              }

              selecionarResultado(resultados[0].layer, resultados[0].nome);
          }

          if (mapSearchBtn && mapSearchInput) {
              mapSearchBtn.addEventListener('click', pesquisarArea);
              mapSearchInput.addEventListener('input', renderSugestoes);
              mapSearchInput.addEventListener('keydown', function(event) {
                  if (event.key === 'Enter') {
                      event.preventDefault();
                      pesquisarArea();
                  }
              });

              document.addEventListener('click', function(event) {
                  if (!mapSearchResults) return;

                  var clicouInput = mapSearchInput && mapSearchInput.contains(event.target);
                  var clicouLista = mapSearchResults.contains(event.target);
                  if (!clicouInput && !clicouLista) {
                      mapSearchResults.classList.remove('show');
                  }
              });
          }

          // Clique fora da camada fecha o painel
          map.on('click', function(e) {
              var painel = document.getElementById("painel");
              painel.classList.remove("ativo");
              painel.classList.add("inativo");
          });

          // Adicionar ao controle de camadas
          layerControl.addOverlay(areaLayer, "Área");

          function adicionarTituloGrupo(selector, titulo) {
              var grupo = document.querySelector(selector);
              if (!grupo) return;

              var existente = grupo.querySelector('.layer-group-title');
              if (existente) return;

              var el = document.createElement('div');
              el.className = 'layer-group-title';
              el.innerText = titulo;
              grupo.prepend(el);
          }

          setTimeout(function() {
              adicionarTituloGrupo('.leaflet-control-layers-base', 'Visualizacao');
              adicionarTituloGrupo('.leaflet-control-layers-overlays', 'Camadas');
          }, 0);

          if (areaLayer.getBounds && !areaLayer.getBounds().isValid()) {
              console.warn('GeoJSON não tem bounds válidos.');
          } else if (areaLayer.getBounds) {
              map.fitBounds(areaLayer.getBounds(), {
                  padding: [36, 36]
              });
              map.setZoom(Math.max(3, map.getZoom() - 1));
          }
      })
      .catch(error => {
          console.error('Erro ao carregar teste.geojson:', error);
          alert('Erro ao carregar teste.geojson:\n' + (error.message || error));
      });

}
</script>

</body>
</html>
